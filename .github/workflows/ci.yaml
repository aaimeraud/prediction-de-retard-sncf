name: CI - Tests & Code Quality

on:
  push:
    branches: [main, develop, "feat/**"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install -r requirements.txt
        pip3 install pytest pytest-cov
    
    - name: Run pytest
      run: |
        python3 -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Check code style (linting)
      run: |
        pip3 install pylint flake8
        flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__,*.pyc || true
    
    - name: Type checking
      run: |
        pip3 install mypy
        mypy src/ --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip3 install bandit safety
    
    - name: Run Bandit (security scanner)
      run: bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Check for known vulnerabilities
      run: safety check --json || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image (dry-run)
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: false
        tags: sncf-delay-prediction:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker build -f Dockerfile -t sncf-test:latest .
        docker run --rm sncf-test:latest python3 -c "import tensorflow; print(f'TensorFlow {tensorflow.__version__}')"
